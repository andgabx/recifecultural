spring.application.name=recifecultural

# Datasource (override via SPRING_DATASOURCE_* in Docker or local env)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recifecultural}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:recifecultural}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:recifecultural}

# JPA (dev-friendly default; use validate/none in production with migrations)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
